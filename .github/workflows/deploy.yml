name: Deploy to Vercel

# Vercel GitHub 연동이 webhook 깨짐 사고 후 신뢰 잃음 (2026-05-12).
# GitHub Actions 가 main 푸시마다 두 앱을 Vercel CLI 로 직접 배포.
#
# 빌드는 Vercel 인프라에서 원격 수행 (dashboard 의 Root Directory =
# apps/{student|teacher}, buildCommand·installCommand 모두 dashboard 의
# 것 적용). CI runner 는 repo root 에서 `vercel deploy` 만 호출.
#
# 필요한 GitHub Secrets:
#   - VERCEL_TOKEN
#   - VERCEL_ORG_ID
#   - VERCEL_PROJECT_ID_STUDENT
#   - VERCEL_PROJECT_ID_TEACHER

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-student:
    name: Deploy student app
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STUDENT }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      # repo root 에서 실행 — Vercel 이 PROJECT_ID 로 dashboard 의
      # Root Directory(apps/student) 를 적용해 그 안에서 빌드.
      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  deploy-teacher:
    name: Deploy teacher app
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TEACHER }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
